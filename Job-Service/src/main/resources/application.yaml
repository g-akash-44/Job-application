spring:
  application:
    name: Jobs
  datasource:
    url: ${DB_URL}
    username: ${DB_NAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8081

eureka:
    client:
        service-url:
         defaultZone: http://localhost:8761/eureka/
        register-with-eureka: true
        fetch-registry: true